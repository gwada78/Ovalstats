function LoginScreen({onLogin,onRegister,onStaffRegister}){
  const [role,setRole]=useState("joueur");

  const [err,setErr]=useState("");
  const [loading,setLoad]=useState(false);

  const submit=()=>{
    setErr("");
    // Admin check
    if(email===ADMIN.email && pass===ADMIN.password){
      setLoad(true);
      setTimeout(()=>{setLoad(false);onLogin("admin",ADMIN);},800);
      return;
    }
    if(role==="joueur"){
      const u=PLAYERS.find(x=>x.email===email&&x.password===pass);
      if(!u){setErr("Email ou mot de passe incorrect.");return;}
      setLoad(true);
      setTimeout(()=>{setLoad(false);onLogin("joueur",u);},800);

      const u=STAFF.find(x=>x.email===email&&x.password===pass);

            <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
              <ellipse cx="22" cy="22" rx="16" ry="10" fill="none" stroke="white" strokeWidth="2.2"/>
              <line x1="22" y1="12" x2="22" y2="32" stroke="white" strokeWidth="2"/>
              <line x1="14" y1="18" x2="30" y2="18" stroke="white" strokeWidth="1.4" strokeLinecap="round"/>
              <line x1="14" y1="22" x2="30" y2="22" stroke="white" strokeWidth="1.4" strokeLinecap="round"/>
              <line x1="14" y1="26" x2="30" y2="26" stroke="white" strokeWidth="1.4" strokeLinecap="round"/>
            </svg>
          </div>
          {/* Wordmark sur 2 lignes */}

            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:14,
              color:"rgba(255,255,255,0.45)",letterSpacing:"0.22em",lineHeight:1}}>OVAL</div>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:36,
              color:C.white,letterSpacing:"0.04em",lineHeight:1,marginTop:2}}>STATS</div>

        </div>

        <p style={{color:"rgba(255,255,255,0.38)",fontSize:13,textAlign:"center",

      {/* Carte formulaire */}
      <div style={{background:C.bg,borderRadius:"28px 28px 0 0",padding:"26px 22px 36px",
        boxShadow:"0 -8px 40px rgba(0,0,0,0.25)",position:"relative",zIndex:1}}>

        <div style={{display:"flex",background:C.alt,borderRadius:99,padding:3,marginBottom:22}}>
          {[["joueur","🏉 Joueur"],["staff","📋 Staff club"]].map(([r,l])=>(
            <button key={r} onClick={()=>{setRole(r);setErr("");}} style={{

/* ══════════════════════════════════════════════════════════
   REGISTER
/* ══════════════════════════════════════════════════════════ */
function RegisterScreen({onBack,onDone}){
  const [step,setStep]=useState(1);
  const [firstName,setFirstName]=useState("");
  const [lastName,setLastName]=useState("");
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [poste,setPoste]=useState("");
  const [num,setNum]=useState("");
  const [depCode,setDepCode]=useState("");
  const [depSearch,setDepSearch]=useState("");
  const [showDeps,setShowDeps]=useState(false);
  const [clubObj,setClubObj]=useState(null);
  const [clubSearch,setClubSearch]=useState("");
  const [manualClub,setManualClub]=useState("");
  const [photo,setPhoto]=useState(null);
  const [err,setErr]=useState("");
  const fileRef=useRef();

  const name=`${firstName} ${lastName}`.trim();

  const filteredDeps=DEPARTEMENTS.filter(d=>
    d.nom.toLowerCase().includes(depSearch.toLowerCase())||d.code.includes(depSearch));
  const selectedDep=DEPARTEMENTS.find(d=>d.code===depCode);
  const clubsInDep=(CLUBS_PAR_DEP[depCode]||[]).sort((a,b)=>a.nom.localeCompare(b.nom,"fr"));
  const filteredClubs=clubsInDep.filter(c=>c.nom.toLowerCase().includes(clubSearch.toLowerCase()));
  const effectiveClub=clubObj||(manualClub?{nom:manualClub,niveau:"—"}:null);

  const handlePhoto=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>setPhoto(ev.target.result);r.readAsDataURL(f);
  };
  const next=()=>{
    setErr("");
    if(step===1&&(!firstName||!lastName||!email||!pass||!photo)){setErr("Tous les champs sont requis, y compris la photo.");return;}
    if(step===2&&(!depCode||!effectiveClub||!poste||!num)){setErr("Tous les champs sont requis.");return;}
    setStep(s=>s+1);
  };
  const confirm=()=>{
    const p={id:Date.now(),name,email,password:pass,poste,num:parseInt(num)||0,
      club:effectiveClub.nom,clubNiveau:effectiveClub.niveau,dep:selectedDep,
      photo,saison:mkSaison(),matches:[],validated:false,
      submittedAt:new Date().toLocaleDateString("fr-FR")};
    PLAYERS.push(p);
    PENDING_PLAYERS.push({...p});
    onDone(p);
  };
  const chooseDep=d=>{setDepCode(d.code);setDepSearch("");setShowDeps(false);
    setClubObj(null);setClubSearch("");setManualClub("");};

  return(
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"Inter,sans-serif"}}>
      <div style={{background:C.navy,padding:"0 0 24px",borderRadius:"0 0 24px 24px",
        position:"relative",overflow:"hidden"}}>
        <TerrainBg opacity={0.07}/>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"16px 18px 0",position:"relative"}}>
          <button onClick={onBack} style={{background:"rgba(255,255,255,0.12)",border:"none",
            color:"white",fontSize:18,cursor:"pointer",fontWeight:800,borderRadius:8,
            width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
          <Logo size={0.78} light/>
        </div>
        <div style={{padding:"16px 22px 0",position:"relative"}}>
          <div style={{fontSize:20,fontWeight:800,color:C.white,fontFamily:"'Syne',sans-serif"}}>Créer un compte</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,0.45)",marginTop:3}}>
            {["Ton identité","Ton club","Confirmer"][step-1]}
          </div>
          <div style={{display:"flex",gap:6,marginTop:14}}>
            {[1,2,3].map(s=>(
              <div key={s} style={{flex:1,height:3,borderRadius:99,
                background:s<=step?C.orange:"rgba(255,255,255,0.15)",transition:"background .3s"}}/>
            ))}
          </div>
        </div>
      </div>

      <div style={{padding:"22px 20px"}}>
        {step===1&&<>
          <div style={{textAlign:"center",marginBottom:22}}>
            <div onClick={()=>fileRef.current.click()} style={{width:80,height:80,borderRadius:20,
              background:C.alt,border:`2px dashed ${photo?C.win:C.orange}`,margin:"0 auto",
              display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",overflow:"hidden"}}>
              {photo?<img src={photo} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>
                :<span style={{fontSize:28}}>📷</span>}
            </div>
            <input ref={fileRef} type="file" accept="image/*" onChange={handlePhoto} style={{display:"none"}}/>
            <div style={{fontSize:12,marginTop:8,fontWeight:600,
              color:photo?C.win:C.orange}}>
              {photo?"Photo ajoutée ✓":"Photo de profil obligatoire *"}
            </div>
          </div>
          <Inp label="Prénom" value={firstName} onChange={setFirstName} placeholder="Thomas"/>
          <Inp label="Nom" value={lastName} onChange={setLastName} placeholder="Dupont"/>
          <Inp label="Email" value={email} onChange={setEmail} placeholder="ton@email.com"/>
          <Inp label="Mot de passe" type="password" value={pass} onChange={setPass} placeholder="Choisir un mot de passe"/>
        </>}

        {step===2&&<>
          {/* Département */}
          <div style={{marginBottom:14,position:"relative",zIndex:showDeps?40:1}}>
            <label style={{fontSize:11,color:C.muted,display:"block",marginBottom:4,
              textTransform:"uppercase",letterSpacing:"0.07em"}}>Département</label>
            <div onClick={()=>setShowDeps(s=>!s)} style={{background:C.bg,
              border:`1.5px solid ${showDeps?C.orange:C.border}`,borderRadius:10,
              padding:"11px 13px",color:selectedDep?C.text:C.muted,fontSize:14,cursor:"pointer",
              display:"flex",justifyContent:"space-between",alignItems:"center",userSelect:"none"}}>
              <span>{selectedDep?`${selectedDep.code} — ${selectedDep.nom}`:"Sélectionner…"}</span>
              <span style={{color:C.muted,fontSize:11}}>{showDeps?"▲":"▼"}</span>
            </div>
            {showDeps&&(
              <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:C.card,
                border:`1.5px solid ${C.orange}`,borderRadius:12,boxShadow:"0 8px 32px rgba(0,0,0,0.14)",
                overflow:"hidden",zIndex:50}}>
                <div style={{padding:"10px 12px",borderBottom:`1px solid ${C.border}`}}>
                  <input autoFocus value={depSearch} onChange={e=>setDepSearch(e.target.value)}
                    placeholder="Nom ou numéro (ex: 78)…"
                    style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,
                      padding:"8px 10px",fontSize:13,outline:"none",boxSizing:"border-box",color:C.text}}/>
                </div>
                <div style={{maxHeight:200,overflowY:"auto"}}>
                  {filteredDeps.map(d=>(
                    <div key={d.code} onClick={()=>chooseDep(d)} style={{padding:"10px 14px",cursor:"pointer",
                      background:depCode===d.code?"#E8F0FF":C.card,fontSize:14,color:C.text,
                      borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:12,
                        color:C.orange,minWidth:28}}>{d.code}</span>
                      <span>{d.nom}</span>
                    </div>
                  ))}
                  {filteredDeps.length===0&&<div style={{padding:"14px",color:C.muted,fontSize:13,textAlign:"center"}}>Aucun résultat</div>}
                </div>
              </div>
            )}
          </div>

          {/* Clubs */}
          {depCode&&<div style={{marginBottom:14}}>
            <label style={{fontSize:11,color:C.muted,display:"block",marginBottom:4,
              textTransform:"uppercase",letterSpacing:"0.07em"}}>
              Club licencié
              {clubsInDep.length>0&&<span style={{color:C.orange,marginLeft:6,fontWeight:600}}>{clubsInDep.length} clubs</span>}
            </label>
            {clubsInDep.length>0&&<>
              {clubsInDep.length>5&&<input value={clubSearch} onChange={e=>setClubSearch(e.target.value)}
                placeholder={`Filtrer parmi ${clubsInDep.length} clubs…`}
                style={{width:"100%",background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:10,
                  padding:"10px 13px",fontSize:13,outline:"none",boxSizing:"border-box",marginBottom:8,color:C.text}}/>}
              <div style={{border:`1.5px solid ${C.border}`,borderRadius:10,overflow:"hidden",marginBottom:10,
                maxHeight:200,overflowY:"auto"}}>
                {filteredClubs.map((c,i)=>(
                  <div key={c.nom} onClick={()=>{setClubObj(c);setManualClub("");}}
                    style={{padding:"10px 12px",cursor:"pointer",
                      background:clubObj?.nom===c.nom?C.navy:i%2===0?C.card:C.bg,
                      color:clubObj?.nom===c.nom?C.white:C.text,
                      borderBottom:i<filteredClubs.length-1?`1px solid ${C.border}`:"none",
                      display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
                    <span style={{fontSize:13,fontWeight:clubObj?.nom===c.nom?600:400}}>{c.nom}</span>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <NivBadge niveau={c.niveau}/>
                      {clubObj?.nom===c.nom&&<span style={{fontSize:13}}>✓</span>}
                    </div>
                  </div>
                ))}
                {filteredClubs.length===0&&<div style={{padding:"12px",color:C.muted,fontSize:13,textAlign:"center"}}>Aucun club correspondant</div>}
              </div>
            </>}
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <div style={{flex:1,height:1,background:C.border}}/>
              <span style={{fontSize:11,color:C.muted,whiteSpace:"nowrap"}}>
                {clubsInDep.length>0?"Pas dans la liste ?":"Saisis ton club"}
              </span>
              <div style={{flex:1,height:1,background:C.border}}/>
            </div>
            <input value={manualClub} onChange={e=>{setManualClub(e.target.value);setClubObj(null);}}
              placeholder="Saisir le nom de ton club…"
              style={{width:"100%",background:C.bg,border:`1.5px solid ${manualClub?C.orange:C.border}`,
                borderRadius:10,padding:"11px 13px",color:C.text,fontSize:14,outline:"none",boxSizing:"border-box"}}/>
            {effectiveClub&&<div style={{marginTop:8,padding:"8px 12px",background:"#E8F7EE",borderRadius:8,
              fontSize:12,color:C.win,fontWeight:600,display:"flex",alignItems:"center",gap:8}}>
              <span>✓ {effectiveClub.nom}</span>
              {effectiveClub.niveau!=="—"&&<NivBadge niveau={effectiveClub.niveau}/>}
            </div>}
          </div>}

          {/* Poste + numéro */}
          {effectiveClub&&<>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:11,color:C.muted,display:"block",marginBottom:4,
                textTransform:"uppercase",letterSpacing:"0.07em"}}>Poste</label>
              <select value={poste} onChange={e=>setPoste(e.target.value)}
                style={{width:"100%",background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:10,
                  padding:"11px 13px",color:poste?C.text:C.muted,fontSize:14,outline:"none",
                  boxSizing:"border-box",appearance:"none",fontFamily:"Inter,sans-serif",
                  backgroundImage:`url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%237A8499' stroke-width='1.4' stroke-linecap='round'/%3E%3C/svg%3E")`,
                  backgroundRepeat:"no-repeat",backgroundPosition:"right 13px center"}}>
                <option value="">Sélectionne ton poste</option>
                {POSTES.map(p=><option key={p} value={p}>{p}</option>)}
              </select>
            </div>
            <Inp label="Numéro de maillot" value={num} onChange={setNum} placeholder="Ex: 9"/>
          </>}
        </>}
        {step===3&&(
          <div style={{background:C.card,borderRadius:16,border:`1px solid ${C.border}`,overflow:"hidden"}}>
            <div style={{background:C.navy,padding:"18px 20px",display:"flex",alignItems:"center",gap:14}}>
              <div style={{width:50,height:50,borderRadius:12,overflow:"hidden",background:C.orange,
                display:"flex",alignItems:"center",justifyContent:"center"}}>
                {photo?<img src={photo} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>
                  :<span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:20,color:C.white}}>#{num}</span>}
              </div>
              <div>
                <div style={{fontSize:17,fontWeight:700,color:C.white}}>{name}</div>
                <div style={{fontSize:12,color:C.orange,fontWeight:600}}>{poste}</div>
              </div>
            </div>
            <div style={{padding:"14px 18px"}}>
              {[
                ["Département", selectedDep?`${selectedDep.code} — ${selectedDep.nom}`:"—"],
                ["Club", effectiveClub?.nom||"—"],
                ["Niveau", effectiveClub?.niveau&&effectiveClub.niveau!=="—"?effectiveClub.niveau:"Non renseigné"],
                ["Email", email],
                ["N° maillot", num],
              ].map(([l,v])=>(
                <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                  padding:"9px 0",borderBottom:`1px solid ${C.border}`,gap:8}}>
                  <span style={{fontSize:13,color:C.muted,flexShrink:0}}>{l}</span>
                  <span style={{fontSize:13,fontWeight:600,color:C.navy,textAlign:"right"}}>{v}</span>
                </div>
              ))}
            </div>
          </div>
        )}
        {err&&<div style={{color:C.loss,fontSize:12,margin:"10px 0",background:"#FFF0F0",
          padding:"8px 12px",borderRadius:8}}>{err}</div>}
        <div style={{marginTop:22}}>
          {step<3
            ?<button onClick={next} style={{width:"100%",background:C.navy,color:C.white,border:"none",
                borderRadius:12,padding:"13px 0",fontSize:15,fontWeight:700,cursor:"pointer",
                fontFamily:"'Syne',sans-serif"}}>Continuer →</button>
            :<button onClick={confirm} style={{width:"100%",background:C.orange,color:C.white,border:"none",
                borderRadius:12,padding:"13px 0",fontSize:15,fontWeight:700,cursor:"pointer",
                fontFamily:"'Syne',sans-serif"}}>Créer mon profil 🏉</button>}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════

            <div class="card"><div class="val">${eff}%</div><div class="lbl">Efficacité plaq.</div></div>
            <div class="card"><div class="val">${s.plaqReussis}</div><div class="lbl">Plaq. réussis</div></div>

          <table><tr><th>Date</th><th>Adversaire</th><th>Score</th><th>Essais</th><th>Plaq.</th></tr>
          ${user.matches.map(m=>`<tr>

            <td>${m.adv}</td>
            <td class="${m.res==="V"?"win":m.res==="D"?"loss":"draw"}">${m.score} (${m.res})</td>
            <td>${m.essais}</td>
            <td>${m.plaqReussis}/${m.plaqReussis+m.plaqRates}</td>
          </tr>`).join("")}
          </table>

          w.document.close();
          setTimeout(()=>w.print(),500);
        }} style={{background:C.alt,border:`1px solid ${C.border}`,color:C.navy,
          fontSize:11,borderRadius:8,padding:"5px 10px",cursor:"pointer",fontWeight:600}}>
          📄 PDF
        </button>
        <button onClick={()=>{
          const txt=`🏉 ${user.name} · ${user.poste} · ${user.club}\nSaison 2024-25 : ${user.saison.essais} essais · ${user.saison.plaqReussis}/${user.saison.plaqReussis+user.saison.plaqRates} plaquages\nSuis tes stats sur OvalStats !\nhttps://gwada78.github.io/Ovalstats/`;
          if(navigator.share){
            navigator.share({title:"OvalStats — "+user.name, text:txt});
          } else {
            navigator.clipboard&&navigator.clipboard.writeText(txt);
            alert("Stats copiées !");
          }
        }} style={{background:C.orange,border:"none",color:C.white,
          fontSize:11,borderRadius:8,padding:"5px 10px",cursor:"pointer",fontWeight:600}}>
          📤 Partager
        </button>
      </TopBar>
      <NotifBanner notifs={notifs} onClose={closeNotifs}/>
      <div style={{padding:"0 16px"}}>
        <HeroNavy>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            {/* Photo sans crayon — clic direct pour changer */}
            <div onClick={onEditPhoto} style={{width:58,height:58,borderRadius:14,overflow:"hidden",
              background:C.orange,border:`2px solid ${C.orange}`,cursor:"pointer",flexShrink:0,
              display:"flex",alignItems:"center",justifyContent:"center"}}>
              {user.photo
                ?<img src={user.photo} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>

            <div>
              <div style={{fontSize:17,fontWeight:700,color:C.white}}>{user.name}</div>
              <div style={{fontSize:13,color:C.orange,fontWeight:600}}>{user.poste}</div>

              {v:`${s.matchs}/${totalMatchsSaison}`, l:"Matchs joués"},
              {v:s.essais,                           l:"Essais"},
              {v:`${tot>0?eff:0}%`,                  l:"Efficacité plaq."},
            ].map((k,i)=>(
              <div key={i} style={{background:"rgba(255,255,255,0.08)",borderRadius:10,
                padding:"10px 6px",textAlign:"center"}}>

          letterSpacing:"0.1em",marginBottom:8}}>Stats saison 2024–25</div>

        {/* Essais + Ballons */}

          {label:"Essais",         value:s.essais,   accent:C.win},
          {label:"Fautes",         value:s.fautes,   accent:C.draw},
          {label:"Ballons gagnés", value:s.ballonsG, accent:C.win},
          {label:"Ballons perdus", value:s.ballonsP, accent:C.loss},
        ]}/>

        {/* Transfo + Pénalités en ratio */}
        {(()=>{
          const items=[
            {label:"Transformations", r:s.transfoR, t:s.transfoR+s.transfoM},
            {label:"Pénalités",       r:s.penR,     t:s.penR+s.penM},
          ].filter(x=>x.t>0);
          if(!items.length) return null;
          return(
            <div style={{display:"grid",
              gridTemplateColumns:items.length===1?"1fr":"1fr 1fr",
              gap:10,marginBottom:16}}>
              {items.map(({label,r,t})=>{
                const pct=Math.round(r/t*100);
                return(
                  <div key={label} style={{background:C.card,borderRadius:13,
                    padding:"14px 12px",border:`1px solid ${C.border}`,textAlign:"center"}}>
                    <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,
                      fontSize:22,color:C.navy,lineHeight:1}}>{r}/{t}</div>
                    <div style={{fontSize:11,fontWeight:700,marginTop:4,
                      color:pct>=70?C.win:pct>=50?C.draw:C.loss}}>{pct}%</div>
                    <div style={{fontSize:10,color:C.muted,marginTop:2,
                      textTransform:"uppercase",letterSpacing:"0.07em"}}>{label}</div>
                  </div>
                );
              })}
            </div>
          );
        })()}

        {/* Cartons côte à côte */}
        <div style={{background:C.card,borderRadius:13,padding:"14px 16px",
          border:`1px solid ${C.border}`,marginBottom:16,
          display:"flex",justifyContent:"space-around",alignItems:"center"}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:32,lineHeight:1}}>🟨</div>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,
              fontSize:24,color:C.draw,marginTop:4}}>{s.cartonsJ}</div>
            <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",
              letterSpacing:"0.07em",marginTop:2}}>Carton jaune</div>
          </div>
          <div style={{width:1,height:60,background:C.border}}/>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:32,lineHeight:1}}>🟥</div>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,
              fontSize:24,color:s.cartonsR>0?C.loss:C.muted,marginTop:4}}>{s.cartonsR}</div>
            <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",
              letterSpacing:"0.07em",marginTop:2}}>Carton rouge</div>
          </div>
        </div>

        <div style={{background:C.card,borderRadius:16,padding:"16px",
          border:`1px solid ${C.border}`,marginBottom:20}}>
          <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",
            letterSpacing:"0.1em",marginBottom:12}}>Indicateurs</div>
          {[
            {l:"Plaquages réussis", v:s.plaqReussis, sub:`sur ${tot} tentatives`, c:C.win},
            {l:"Efficacité plaquages", v:`${eff}%`, c:C.navy},
            {l:"Essais / match", v:s.matchs>0?+(s.essais/s.matchs).toFixed(1):0, c:C.orange},
          ].map((r,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
              padding:"9px 0",borderBottom:i<2?`1px solid ${C.border}`:"none"}}>
              <div>
                <div style={{fontSize:13,color:C.text}}>{r.l}</div>
                {r.sub&&<div style={{fontSize:11,color:C.muted}}>{r.sub}</div>}
              </div>
              <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:20,color:r.c}}>{r.v}</span>
            </div>
          ))}
        </div>

        {/* Messagerie */}
        {(()=>{
          const msgs=MESSAGES.filter(m=>m.club===user.club);
          const unread=msgs.filter(m=>!m.read.includes(user.id)).length;
          if(!msgs.length) return null;
          return(
            <div style={{background:C.card,borderRadius:14,border:`1px solid ${C.border}`,
              marginBottom:16,overflow:"hidden"}}>
              <div style={{padding:"12px 14px",background:C.alt,display:"flex",
                justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:11,color:C.muted,textTransform:"uppercase",
                  letterSpacing:"0.1em",fontWeight:700}}>
                  💬 Messages du club
                </div>
                {unread>0&&(
                  <span style={{background:C.orange,color:C.white,fontSize:10,
                    fontWeight:700,borderRadius:99,padding:"2px 8px"}}>
                    {unread} nouveau{unread>1?"x":""}
                  </span>
                )}
              </div>
              {msgs.map((m,i)=>{
                const isUnread=!m.read.includes(user.id);
                return(
                  <div key={m.id} onClick={()=>{
                    if(!m.read.includes(user.id)) m.read.push(user.id);
                  }} style={{padding:"12px 14px",borderBottom:i<msgs.length-1?`1px solid ${C.border}`:"none",
                    background:isUnread?"#FFFBF0":C.card,cursor:"pointer"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                      <div style={{fontSize:11,fontWeight:700,color:C.navy}}>
                        {m.from}
                        <span style={{color:C.muted,fontWeight:400,marginLeft:4,fontSize:10}}>
                          · {m.fromRole==="entraineur"?"Entraîneur":m.fromRole==="president"?"Président":"Staff"}
                        </span>
                      </div>
                      <div style={{fontSize:10,color:C.muted}}>{m.date}</div>
                    </div>
                    <div style={{fontSize:13,color:C.text,lineHeight:1.5}}>{m.content}</div>
                    {isUnread&&<div style={{fontSize:10,color:C.orange,fontWeight:700,marginTop:4}}>● Non lu</div>}
                  </div>
                );
              })}
            </div>
          );
        })()}

        <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",
          letterSpacing:"0.1em",marginBottom:8}}>Stats par match</div>
        {user.matches.length===0
          ?<div style={{textAlign:"center",padding:"28px 20px",color:C.muted,fontSize:13,
              background:C.card,borderRadius:14,border:`1px solid ${C.border}`}}>
            <div style={{fontSize:28,marginBottom:8}}>🏉</div>
            Aucun match enregistré.<br/>
            <span style={{color:C.orange,fontWeight:600}}>Le staff saisit les stats après chaque match.</span>
          </div>
          :<div style={{display:"flex",flexDirection:"column",gap:8}}>
            {user.matches.map(m=>(
              <div key={m.id} onClick={()=>onMatchClick(m)}
                style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,
                  padding:"13px 16px",display:"flex",alignItems:"center",
                  justifyContent:"space-between",cursor:"pointer"}}
                onMouseEnter={e=>e.currentTarget.style.borderColor=C.orange}
                onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <ResTag res={m.res}/>
                  <div>
                    <div style={{fontSize:14,fontWeight:600,color:C.text}}>{m.adv}</div>
                    <div style={{fontSize:11,color:C.muted}}>{m.date} · {m.minutesJouees} min.</div>
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontFamily:"'Syne',sans-serif",fontWeight:700,
                    fontSize:15,color:C.navy}}>{m.score}</span>
                  <span style={{color:C.orange,fontSize:18,fontWeight:800}}>›</span>
                </div>
              </div>
            ))}
          </div>
        }
      </div>
    </div>
  );
}

              {/* Barre visuelle */}
              {tot>0&&(
                <div style={{height:10,background:C.loss+"33",borderRadius:99,overflow:"hidden",marginBottom:14}}>

                    borderRadius:99,transition:"width .5s ease"}}/>

              <div style={{display:"flex",justifyContent:"space-between",

                    {totS>0?`${pctS}%`:"—"}

                  {tot>0&&totS>0&&(
                    <span style={{fontSize:12,fontWeight:700,
                      color:pct>pctS?C.win:pct<pctS?C.loss:C.muted}}>
                      {pct>pctS?`▲ +${pct-pctS}%`:pct<pctS?`▼ ${pct-pctS}%`:"= égal"}

                  )}
                </div>
              </div>
            </div>
          );
        })()}

    </div>
  );
}

const STAFF_ROLES = [
  {key:"president",   label:"Président de club",   desc:"Accès complet stats. Valide tout le staff.",           needsValidation:true, validatedBy:["admin"]},
  {key:"entraineur",  label:"Entraîneur",           desc:"Accès complet stats. Pas de saisie match.",            needsValidation:true, validatedBy:["president","admin"]},
  {key:"soigneur",    label:"Soigneur",             desc:"Saisie match + compo + effectif.",                     needsValidation:true, validatedBy:["entraineur","president","admin"]},
  {key:"preparateur", label:"Préparateur physique", desc:"Saisie match + compo + effectif.",                     needsValidation:true, validatedBy:["entraineur","president","admin"]},
  {key:"benevole",    label:"Bénévole",             desc:"Saisie match + compo + effectif.",                     needsValidation:true, validatedBy:["entraineur","president","admin"]},
  {key:"intendant",   label:"Intendant",            desc:"Saisie match + compo + effectif.",                     needsValidation:true, validatedBy:["entraineur","president","admin"]},
];

// Rôles avec accès saisie match
const CAN_SAISIE = ["soigneur","preparateur","benevole","intendant"];
// Rôles avec accès stats globales
const CAN_STATS  = ["president","entraineur"];

// Qui peut valider quoi
const canValidate = (validatorRole, targetRole) => {
  if(validatorRole==="admin") return ["president","entraineur"].includes(targetRole);
  const r = STAFF_ROLES.find(x=>x.key===targetRole);
  if(!r) return false;
  return r.validatedBy.includes(validatorRole);
};

function CompoScreen({club, onBack}){
  const squad = PLAYERS.filter(p=>p.club===club);
  const [compo, setCompo] = useState(()=>{
    if(COMPO_PAR_CLUB[club]&&Object.keys(COMPO_PAR_CLUB[club]).length>0)
      return {...COMPO_PAR_CLUB[club]};
    // Compo par défaut : joueurs triés par numéro assignés aux postes 1-15
    const sorted=[...PLAYERS.filter(p=>p.club===club)].sort((a,b)=>a.num-b.num);
    const def={};
    for(let i=1;i<=23;i++){
      const p=sorted.find(pl=>pl.num===i);
      if(p) def[i]=p.id;
    }
    return def;
  });
  // Numéros de maillot modifiables pour ce match (par défaut : numéro du joueur)
  const [maillotsMatch, setMaillotsMatch] = useState(()=>{
    const m={};
    squad.forEach(p=>{m[p.id]=p.num;});
    return m;
  });
  const [saved, setSaved] = useState(false);

  const ALL_POSTES = [
    {num:1, poste:"Pilier gauche"},{num:2, poste:"Talonneur"},{num:3, poste:"Pilier droit"},
    {num:4, poste:"2e ligne G"},   {num:5, poste:"2e ligne D"},
    {num:6, poste:"3e ligne aile G"},{num:7,poste:"3e ligne aile D"},{num:8,poste:"N°8"},
    {num:9, poste:"Demi de mêlée"},{num:10,poste:"Demi d'ouverture"},
    {num:11,poste:"Ailier G"},     {num:12,poste:"Centre G"},
    {num:13,poste:"Centre D"},     {num:14,poste:"Ailier D"},  {num:15,poste:"Arrière"},
    {num:16,poste:"Remplaçant 1"}, {num:17,poste:"Remplaçant 2"},{num:18,poste:"Remplaçant 3"},
    {num:19,poste:"Remplaçant 4"}, {num:20,poste:"Remplaçant 5"},{num:21,poste:"Remplaçant 6"},
    {num:22,poste:"Remplaçant 7"}, {num:23,poste:"Remplaçant 8"},
  ];

  const saveCompo = () => {
    COMPO_PAR_CLUB[club] = {...compo};
    squad.forEach(p=>{
      if(maillotsMatch[p.id]!==undefined) p.numMatch=maillotsMatch[p.id];
    });
    const matchDate = new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
    // Message automatique à toute l'équipe
    addMessage("Staff", "entraineur", club, "📋 La composition pour le prochain match est disponible ! Consultez l'app pour voir votre place dans le 15.");
    // Notif pour TOUS les joueurs du club (pas seulement ceux dans la compo)
    PLAYERS.filter(p=>p.club===club).forEach(p=>{
      NOTIFICATIONS.push({
        id:Date.now()+p.id,
        playerId:p.id,
        type:"compo",
        matchAdv:"prochain match",
        date:matchDate,
        read:false,
      });
    });
    setSaved(true);
    setTimeout(()=>setSaved(false), 2000);
  };

  const titulaires = ALL_POSTES.slice(0,15);
  const remplacants = ALL_POSTES.slice(15);

  const renderPoste = ({num, poste}) => {
    const playerId = compo[num];
    const player = squad.find(p=>String(p.id)===String(playerId));
    return(
      <div key={num} style={{background:C.card,border:`1px solid ${playerId?C.border:C.border}`,
        borderRadius:12,padding:"10px 12px",display:"flex",alignItems:"center",gap:10}}>
        {/* Numéro de poste */}
        <div style={{width:32,height:32,borderRadius:8,
          background:num<=15?C.navy:C.muted,flexShrink:0,
          display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,
            fontSize:13,color:C.white}}>{num}</span>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:10,color:C.muted,marginBottom:3}}>{poste}</div>
          <select value={compo[num]||""} onChange={e=>setCompo(c=>({...c,[num]:e.target.value}))}
            style={{width:"100%",background:C.bg,border:`1px solid ${C.border}`,
              borderRadius:7,padding:"6px 10px",fontSize:12,outline:"none",
              color:playerId?C.text:C.muted,appearance:"none",fontFamily:"Inter,sans-serif",
              backgroundImage:`url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l3 3 3-3' stroke='%237A8499' stroke-width='1.2' stroke-linecap='round'/%3E%3C/svg%3E")`,
              backgroundRepeat:"no-repeat",backgroundPosition:"right 8px center"}}>
            <option value="">— Choisir</option>
            {squad.map(p=>(
              <option key={p.id} value={p.id}>{p.name}</option>
            ))}
          </select>
        </div>
        {/* Numéro de maillot pour ce match */}
        {player&&(
          <div style={{flexShrink:0,textAlign:"center"}}>
            <div style={{fontSize:9,color:C.muted,marginBottom:2}}>Maillot</div>
            <input
              type="number"
              value={maillotsMatch[player.id]??player.num}
              onChange={e=>setMaillotsMatch(m=>({...m,[player.id]:parseInt(e.target.value)||player.num}))}
              style={{width:44,background:C.bg,border:`1.5px solid ${C.orange}`,
                borderRadius:7,padding:"5px 4px",fontSize:13,fontWeight:700,
                color:C.navy,textAlign:"center",outline:"none",
                fontFamily:"'Syne',sans-serif"}}/>
          </div>
        )}
      </div>
    );
  };

  return(
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"Inter,sans-serif",paddingBottom:80}}>
      <TopBar onBack={onBack} title="📋 Composition"/>
      <div style={{padding:"12px 16px"}}>
        <div style={{fontSize:12,color:C.muted,marginBottom:14,lineHeight:1.5}}>
          Assigne chaque joueur à son poste et confirme son numéro de maillot pour ce match.
        </div>

        {/* Titulaires 1-15 */}
        <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",
          letterSpacing:"0.1em",marginBottom:8}}>Titulaires (1–15)</div>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
          {titulaires.map(renderPoste)}
        </div>

        {/* Remplaçants 16-23 */}
        <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",
          letterSpacing:"0.1em",marginBottom:8}}>Remplaçants (16–23)</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {remplacants.map(renderPoste)}
        </div>
      </div>

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",
        width:374,padding:"12px 16px",background:C.bg,borderTop:`1px solid ${C.border}`,zIndex:10}}>
        <button onClick={saveCompo} style={{width:"100%",
          background:saved?C.win:C.orange,color:C.white,border:"none",borderRadius:14,
          padding:"14px 0",fontSize:15,fontWeight:700,cursor:"pointer",
          fontFamily:"'Syne',sans-serif",transition:"background .3s"}}>
          {saved?"✓ Composition enregistrée !":"Enregistrer la composition"}
        </button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   VALIDATION JOUEURS — composant partagé par tout le staff
/* ══════════════════════════════════════════════════════════ */
function PlayerValidationTab({club}){
  const [tick,setTick]=useState(0); // force re-render
  const pending=PENDING_PLAYERS.filter(p=>p.club===club&&!PLAYERS.find(x=>x.id===p.id&&x.validated));

  const validate=(id)=>{
    const player=PLAYERS.find(x=>x.id===id);
    if(player) player.validated=true;
    const pi=PENDING_PLAYERS.findIndex(x=>x.id===id);
    if(pi>-1) PENDING_PLAYERS.splice(pi,1);
    setTick(t=>t+1);
  };
  const reject=(id)=>{
    const idx=PLAYERS.findIndex(x=>x.id===id);
    if(idx>-1) PLAYERS.splice(idx,1);
    const pi=PENDING_PLAYERS.findIndex(x=>x.id===id);
    if(pi>-1) PENDING_PLAYERS.splice(pi,1);
    setTick(t=>t+1);
  };

  if(pending.length===0) return(
    <div style={{textAlign:"center",padding:"32px 20px",color:C.muted,fontSize:13,
      background:C.card,borderRadius:14,border:`1px solid ${C.border}`}}>
      <div style={{fontSize:32,marginBottom:8}}>✅</div>
      Aucun joueur en attente de validation
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {pending.map(p=>(
        <div key={p.id} style={{background:C.card,border:`1.5px solid ${C.orange}44`,
          borderRadius:14,padding:"14px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
            <div style={{width:44,height:44,borderRadius:11,overflow:"hidden",
              background:C.alt,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
              {p.photo
                ?<img src={p.photo} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>
                :<span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16,color:C.navy}}>#{p.num}</span>}
            </div>
            <div>
              <div style={{fontSize:14,fontWeight:700,color:C.navy}}>{p.name}</div>
              <div style={{fontSize:11,color:C.muted}}>{p.poste} · #{p.num}</div>
              <div style={{fontSize:11,color:C.orange,marginTop:1}}>
                Inscrit le {p.submittedAt}
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>reject(p.id)} style={{flex:1,background:"#FFF0F0",
              color:C.loss,border:`1px solid ${C.loss}33`,borderRadius:10,
              padding:"10px 0",fontSize:13,fontWeight:700,cursor:"pointer",
              fontFamily:"'Syne',sans-serif"}}>✕ Refuser</button>
            <button onClick={()=>validate(p.id)} style={{flex:2,background:C.win,
              color:C.white,border:"none",borderRadius:10,
              padding:"10px 0",fontSize:13,fontWeight:700,cursor:"pointer",
              fontFamily:"'Syne',sans-serif"}}>✓ Valider</button>
          </div>
        </div>
      ))}
    </div>
  );
}

let MESSAGES = [
  {id:1, from:"Marc Testard", fromRole:"entraineur", club:"Union Rugby Centre 78",
   to:"all", content:"Entraînement annulé ce mercredi — terrain indisponible. Prochain entraînement vendredi 18h.", date:"24 Juin 2025", read:[]},
  {id:2, from:"Pierre Durand", fromRole:"president", club:"Union Rugby Centre 78",
   to:"all", content:"Réunion de fin de saison samedi 28 juin à 11h au club house. Présence souhaitée pour tous.", date:"23 Juin 2025", read:[]},
];

function addMessage(from, fromRole, club, content) {
  MESSAGES.unshift({
    id: Date.now(),
    from, fromRole, club,
    to: "all",
    content,
    date: new Date().toLocaleDateString("fr-FR", {day:"numeric",month:"long",year:"numeric"}),
    read: [],
  });
}

function getUnreadMessages(playerId, club) {
  return MESSAGES.filter(m => m.club === club && !m.read.includes(playerId));
}

function markMessagesRead(playerId, club) {
  MESSAGES.filter(m => m.club === club).forEach(m => {
    if(!m.read.includes(playerId)) m.read.push(playerId);
  });
}

// ── NOTIFICATIONS (simulées — en prod : FCM/APNs) ──────────────────
let NOTIFICATIONS = []; // { playerId, matchAdv, date, read }

function addNotifications(squad, matchAdv, matchDate) {
  squad.forEach(p => {
    NOTIFICATIONS.push({
      id: Date.now() + p.id,
      playerId: p.id,
      matchAdv,
      date: matchDate,
      read: false,
    });
  });
}

function getUnreadNotifs(playerId) {
  return NOTIFICATIONS.filter(n => n.playerId === playerId && !n.read);
}

function markNotifsRead(playerId) {
  NOTIFICATIONS.forEach(n => { if(n.playerId === playerId) n.read = true; });
}
