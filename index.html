    {k:"essais",       l:"Essais",    emoji:"🏉"},
    {k:"plaqReussis",  l:"Plaqueurs", emoji:"💪"},
    {k:"ballonsG",     l:"Turnovers", emoji:"🔄"},
    {k:"cartonsJ",     l:"Cartons",   emoji:"🟨"},
  ];

  // Pour les plaquages : tri par % réussi
  const getVal=(p,k)=>{
    if(k==="plaqReussis"){
      const tot=p.saison.plaqReussis+p.saison.plaqRates;
      return tot>0?Math.round(p.saison.plaqReussis/tot*100):0;
    }
    return p.saison[k];
  };
  const sorted=[...squad].sort((a,b)=>getVal(b,rankTab)-getVal(a,rankTab));
  const max=getVal(sorted[0],rankTab)||1;

  return(
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"Inter,sans-serif",paddingBottom:32}}>
      <TopBar onLogout={onLogout}/>
      <div style={{padding:"0 16px"}}>
        <HeroNavy>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.4)",textTransform:"uppercase",
            letterSpacing:"0.12em",marginBottom:2}}>{staff.role||"Staff"}</div>
          <div style={{fontSize:19,fontWeight:800,color:C.white,
            fontFamily:"'Syne',sans-serif"}}>{staff.club}</div>
          <div style={{fontSize:12,color:C.orange,marginTop:2}}>
            {squad.length} joueur{squad.length>1?"s":""} · Saison 2024–25
          </div>
        </HeroNavy>

        <div style={{display:"flex",background:C.alt,borderRadius:99,padding:3,marginBottom:16}}>
          {[
            ["equipe","🏉 Équipe"],
            ["joueurs",`👤 Joueurs${pendingCount>0?` (${pendingCount})`:""}`],
            ["staff",`📋 Staff${pendingStaffCount>0?` (${pendingStaffCount})`:""}`],
          ].map(t=>(
            <button key={t[0]} onClick={()=>setMainTab(t[0])} style={{
              flex:1,padding:"9px 0",borderRadius:99,border:"none",cursor:"pointer",
              background:mainTab===t[0]?C.navy:"transparent",
              color:mainTab===t[0]?C.white:C.muted,
              fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:11,transition:"all .2s"}}>
              {t[1]}
            </button>
          ))}
        </div>

        {mainTab==="joueurs"&&<PlayerValidationTab club={staff.club}/>}
        {mainTab==="staff"&&(()=>{
          const pendingStaff=PENDING_STAFF.filter(p=>p.club===staff.club&&canValidate("entraineur",p.role));
          const roleLabel={soigneur:"Soigneur",preparateur:"Préparateur physique",benevole:"Bénévole",intendant:"Intendant"};
          return pendingStaff.length===0?(
            <div style={{background:C.card,borderRadius:14,padding:"24px",textAlign:"center",
              border:`1px solid ${C.border}`,color:C.muted,fontSize:13}}>
              <div style={{fontSize:28,marginBottom:8}}>✅</div>
              Aucune demande staff en attente
            </div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {pendingStaff.map(p=>(
                <div key={p.id} style={{background:C.card,border:`1.5px solid ${C.orange}44`,
                  borderRadius:14,padding:"14px 16px"}}>
                  <div style={{fontSize:14,fontWeight:700,color:C.navy}}>{p.name}</div>
                  <div style={{fontSize:12,color:C.muted}}>{p.email}</div>
                  <div style={{fontSize:11,color:C.orange,marginTop:2,fontWeight:600}}>
                    {roleLabel[p.role]||p.role} · {p.submittedAt}
                  </div>
                  <div style={{display:"flex",gap:8,marginTop:10}}>
                    <button onClick={()=>{
                      const idx=STAFF.findIndex(x=>x.id===p.id);
                      if(idx>-1) STAFF.splice(idx,1);
                      const pi=PENDING_STAFF.findIndex(x=>x.id===p.id);
                      if(pi>-1) PENDING_STAFF.splice(pi,1);
                      setStaffTick(t=>t+1);
                    }} style={{flex:1,background:"#FFF0F0",color:C.loss,
                      border:`1px solid ${C.loss}33`,borderRadius:10,padding:"9px 0",
                      fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'Syne',sans-serif"}}>
                      ✕ Refuser
                    </button>
                    <button onClick={()=>{
                      const s=STAFF.find(x=>x.id===p.id);
                      if(s) s.validated=true;
                      const pi=PENDING_STAFF.findIndex(x=>x.id===p.id);
                      if(pi>-1) PENDING_STAFF.splice(pi,1);
                      setStaffTick(t=>t+1);
                    }} style={{flex:2,background:C.win,color:C.white,border:"none",
                      borderRadius:10,padding:"9px 0",fontSize:13,fontWeight:700,
                      cursor:"pointer",fontFamily:"'Syne',sans-serif"}}>
                      ✓ Valider
                    </button>
                  </div>
                </div>
              ))}
            </div>
          );
        })()}
        {mainTab==="equipe"&&<>
        {/* Envoyer un message */}
        <MessageCompose staff={staff}/>

        <div style={{display:"flex",gap:10,marginBottom:16}}>
          <button onClick={onCompo} style={{width:"100%",background:C.card,color:C.navy,
            border:`1.5px solid ${C.border}`,borderRadius:14,padding:"14px 12px",
            cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:14,
            textAlign:"center"}}>
            📋 Saisir / voir la composition
          </button>
        </div>

        {/* Classement par stat */}
        <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",
          letterSpacing:"0.1em",marginBottom:8}}>Classement équipe</div>

        {/* Onglets */}
        <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",paddingBottom:2}}>
          {RANK_TABS.map(t=>(
            <button key={t.k} onClick={()=>setRankTab(t.k)} style={{
              padding:"7px 14px",borderRadius:99,border:"none",cursor:"pointer",
              whiteSpace:"nowrap",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:12,
              background:rankTab===t.k?C.navy:C.card,
              color:rankTab===t.k?C.white:C.muted,
              outline:rankTab===t.k?"none":`1px solid ${C.border}`,
              transition:"all .2s"
            }}>{t.emoji} {t.l}</button>
          ))}
        </div>

        {/* Liste classée */}
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
          {sorted.map((p,idx)=>{
            const val=getVal(p,rankTab);
            const pct=Math.min((val/max)*100,100);
            const medals=["🥇","🥈","🥉"];
            const isPlaq=rankTab==="plaqReussis";
            const totPlaq=p.saison.plaqReussis+p.saison.plaqRates;
            return(
              <div key={p.id} onClick={()=>onPlayerClick(p)}
                style={{background:C.card,border:`1px solid ${idx===0?C.orange:C.border}`,
                  borderRadius:14,padding:"12px 14px",cursor:"pointer"}}
                onMouseEnter={e=>e.currentTarget.style.borderColor=C.orange}
                onMouseLeave={e=>e.currentTarget.style.borderColor=idx===0?C.orange:C.border}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  {/* Rang */}
                  <div style={{width:28,flexShrink:0,textAlign:"center",
                    fontSize:idx<3?18:13,
                    fontFamily:"'Syne',sans-serif",fontWeight:800,
                    color:idx<3?"inherit":C.muted}}>
                    {idx<3?medals[idx]:`${idx+1}`}
                  </div>
                  {/* Avatar */}
                  <div style={{width:36,height:36,borderRadius:9,background:C.alt,
                    overflow:"hidden",flexShrink:0,display:"flex",
                    alignItems:"center",justifyContent:"center"}}>
                    {p.photo
                      ?<img src={p.photo} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>
                      :<span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,
                        fontSize:13,color:C.navy}}>#{p.num}</span>}
                  </div>
                  {/* Infos */}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:600,color:C.text,
                          overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
                        <div style={{fontSize:11,color:C.muted}}>{p.poste}</div>
                      </div>
                      <div style={{textAlign:"right",flexShrink:0,marginLeft:8}}>
                        <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,
                          fontSize:22,color:idx===0?C.orange:C.navy}}>
                          {isPlaq?`${val}%`:val}
                        </span>
                        {isPlaq&&totPlaq>0&&(
                          <div style={{fontSize:10,color:C.muted}}>
                            {p.saison.plaqReussis}/{totPlaq}
                          </div>
                        )}
                      </div>
                    </div>
                    {/* Barre */}
                    <div style={{height:4,background:C.alt,borderRadius:99,overflow:"hidden",marginTop:6}}>
                      <div style={{height:"100%",width:`${pct}%`,
                        background:idx===0?C.orange:C.navy,borderRadius:99}}/>
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        {/* Effectif complet */}
        <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",
          letterSpacing:"0.1em",marginBottom:8}}>Effectif complet</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {squad.map(p=>(
            <div key={p.id} onClick={()=>onPlayerClick(p)}
              style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,
                padding:"13px 16px",display:"flex",alignItems:"center",
                justifyContent:"space-between",cursor:"pointer"}}
              onMouseEnter={e=>e.currentTarget.style.borderColor=C.orange}
              onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:38,height:38,borderRadius:10,background:C.alt,overflow:"hidden",
                  flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {p.photo?<img src={p.photo} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>
                    :<span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,
                      fontSize:14,color:C.navy}}>#{p.num}</span>}
                </div>
                <div>
                  <div style={{fontSize:14,fontWeight:600,color:C.text}}>{p.name}</div>
                  <div style={{fontSize:11,color:C.muted}}>{p.poste}</div>
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:13,fontWeight:700,color:C.orange,
                  fontFamily:"'Syne',sans-serif"}}>{p.saison.essais} essais</div>
                <div style={{fontSize:11,color:C.muted}}>{p.saison.matchs} matchs</div>
              </div>
            </div>
          ))}
        </div>
        </>}
      </div>
    </div>
  );
}
/* ══════════════════════════════════════════════════════════ */
function SaisieLive({staff,onBack}){
  const squadRaw=PLAYERS.filter(p=>p.club===staff.club);
  // Utilise la compo si disponible, sinon tri par numéro
  const compo=COMPO_PAR_CLUB[staff.club]||{};
  const compoIds=Object.values(compo).map(Number).filter(Boolean);
  const squad = compoIds.length>0
    ? compoIds.map(id=>squadRaw.find(p=>p.id===id)).filter(Boolean)
    : [...squadRaw].sort((a,b)=>a.num-b.num);
  const [tab,setTab]=useState("actions");
  const [scores,setScores]=useState(()=>{
    const s={};
    squad.forEach(p=>{s[p.id]={essais:0,transfoR:0,transfoM:0,penR:0,penM:0,drops:0,fautes:0,cartonsJ:0,cartonsR:0,
      plaqReussis:0,plaqRates:0,ballonsG:0,ballonsP:0,minutesJouees:80,onField:true,entryTime:0};});
    return s;
  });
  const [matchTime,setMatchTime]=useState(0);
  const [running,setRunning]=useState(false);
  const [modal,setModal]=useState(null);
  const [pickedPlayer,setPicked]=useState(null);
  const [changModal,setChangModal]=useState(false);
  const [changOut,setChangOut]=useState(null);
  const [changIn,setChangIn]=useState(null);
  const [saved,setSaved]=useState(false);
  const [showRecap,setShowRecap]=useState(false);
  // Score & adversaire
  const [matchPhase,setMatchPhase]=useState("setup"); // setup | live | scoreEntry
  const [adversaire,setAdversaire]=useState("");
  const [scoreNous,setScoreNous]=useState(0);
  const [scoreEux,setScoreEux]=useState(0);
  const [showScore,setShowScore]=useState(false);
  // Joueurs actifs (titulaires + remplaçants entrés)
  const [activeIds,setActiveIds]=useState(()=>new Set(squad.slice(0,15).map(p=>p.id)));
  const timerRef=useRef(null);

  useEffect(()=>{
    if(running)timerRef.current=setInterval(()=>setMatchTime(t=>t+1),1000);
    else clearInterval(timerRef.current);
    return()=>clearInterval(timerRef.current);
  },[running]);

  const fmtTime=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

  const ACTION_TYPES=[
    {type:"essais",   label:"Essai",         emoji:"🏉",color:"#1E8A4C",  pts:5},
    {type:"transfo",  label:"Transformation",emoji:"⚽",color:C.navy,     pts:2, hasResult:true},
    {type:"penalites",label:"Pénalité",      emoji:"🎯",color:"#2D5C88",  pts:3, hasResult:true},
    {type:"drops",    label:"Drop",          emoji:"🦵",color:"#5C3D8F",  pts:3, hasResult:true},
    {type:"fautes",   label:"Faute",         emoji:"⚠️",color:"#B85C00"},
    {type:"cartonsJ", label:"Carton jaune",  emoji:"🟨",color:C.draw},
    {type:"cartonsR", label:"Carton rouge",  emoji:"🟥",color:C.loss},
  ];

  const [resultPending,setResultPending]=useState(false);

  const confirmAction=()=>{
    if(!pickedPlayer)return;
    if(modal.hasResult && !resultPending){
      setResultPending(true);
      return;
    }
    // Pour essais et drops : ajoute direct + comptabilise pts notre score
    if(modal.type==="essais"){
      setScores(s=>({...s,[pickedPlayer.id]:{...s[pickedPlayer.id],essais:s[pickedPlayer.id].essais+1}}));
      setScoreNous(sc=>sc+5);
    } else if(modal.type==="drops"){
      setScores(s=>({...s,[pickedPlayer.id]:{...s[pickedPlayer.id],drops:(s[pickedPlayer.id].drops||0)+1}}));
      setScoreNous(sc=>sc+3);
    } else if(modal.type==="fautes"){
      setScores(s=>({...s,[pickedPlayer.id]:{...s[pickedPlayer.id],fautes:s[pickedPlayer.id].fautes+1}}));
    } else if(modal.type==="cartonsJ"){
      setScores(s=>({...s,[pickedPlayer.id]:{...s[pickedPlayer.id],cartonsJ:s[pickedPlayer.id].cartonsJ+1}}));
    } else if(modal.type==="cartonsR"){
      setScores(s=>({...s,[pickedPlayer.id]:{...s[pickedPlayer.id],cartonsR:s[pickedPlayer.id].cartonsR+1}}));
    }
    setModal(null);setPicked(null);setResultPending(false);
  };

  const confirmResult=(success)=>{
    if(!pickedPlayer)return;
    if(modal.type==="transfo"){
      setScores(s=>({...s,[pickedPlayer.id]:{...s[pickedPlayer.id],
        transfoR:s[pickedPlayer.id].transfoR+(success?1:0),
        transfoM:s[pickedPlayer.id].transfoM+(success?0:1)}}));
      if(success) setScoreNous(sc=>sc+2);
    } else if(modal.type==="drops"){
      setScores(s=>({...s,[pickedPlayer.id]:{...s[pickedPlayer.id],
        dropsR:(s[pickedPlayer.id].dropsR||0)+(success?1:0),
        dropsM:(s[pickedPlayer.id].dropsM||0)+(success?0:1)}}));
      if(success) setScoreNous(sc=>sc+3);
    } else {
      setScores(s=>({...s,[pickedPlayer.id]:{...s[pickedPlayer.id],
        penR:s[pickedPlayer.id].penR+(success?1:0),
        penM:s[pickedPlayer.id].penM+(success?0:1)}}));
      if(success) setScoreNous(sc=>sc+3);
    }
    setModal(null);setPicked(null);setResultPending(false);
  };

  const confirmChange=()=>{
    if(!changOut||!changIn)return;
    const minPlayed=Math.floor(matchTime/60);
    setScores(s=>({...s,
      [changOut.id]:{...s[changOut.id],onField:false,minutesJouees:minPlayed},
      [changIn.id]:{...s[changIn.id],onField:true,entryTime:minPlayed},
    }));
    // Mettre à jour les joueurs actifs dans les listes
    setActiveIds(prev=>{
      const n=new Set(prev);
      n.delete(changOut.id);
      n.add(changIn.id);
      return n;
    });
    setChangModal(false);setChangOut(null);setChangIn(null);
  };

  const saveMatch=()=>{
    const totalMin=Math.max(1,Math.floor(matchTime/60));
    const matchDate=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
    const res=scoreNous>scoreEux?"V":scoreNous<scoreEux?"D":"N";
    const scoreStr=`${scoreNous} – ${scoreEux}`;
    const adv=adversaire.trim()||"Adversaire";
    const activeSquad=squad.filter(p=>activeIds.has(p.id));
    activeSquad.forEach(p=>{
      const sc=scores[p.id]||{essais:0,transfoR:0,transfoM:0,penR:0,penM:0,drops:0,fautes:0,
        cartonsJ:0,cartonsR:0,plaqReussis:0,plaqRates:0,ballonsG:0,ballonsP:0,
        minutesJouees:80,onField:true};
      p.saison.essais+=sc.essais;p.saison.transfoR+=sc.transfoR;p.saison.transfoM+=sc.transfoM;
      p.saison.penR+=sc.penR;p.saison.penM+=sc.penM;p.saison.drops=(p.saison.drops||0)+(sc.drops||0);p.saison.fautes+=sc.fautes;
      p.saison.cartonsJ+=sc.cartonsJ;p.saison.cartonsR+=sc.cartonsR;
      p.saison.plaqReussis+=sc.plaqReussis;p.saison.plaqRates+=sc.plaqRates;
      p.saison.ballonsG+=sc.ballonsG;p.saison.ballonsP+=sc.ballonsP;
      p.saison.minutesJouees+=sc.onField?totalMin:sc.minutesJouees;
      p.saison.matchs+=1;
      p.matches.unshift({id:Date.now()+p.id,adv,date:matchDate,
        res,score:scoreStr,essais:sc.essais,transfoR:sc.transfoR,transfoM:sc.transfoM,
        penR:sc.penR,penM:sc.penM,fautes:sc.fautes,cartonsJ:sc.cartonsJ,cartonsR:sc.cartonsR,
        plaqReussis:sc.plaqReussis,plaqRates:sc.plaqRates,
        ballonsG:sc.ballonsG,ballonsP:sc.ballonsP,
        minutesJouees:sc.onField?totalMin:sc.minutesJouees});
    });
    addNotifications(activeSquad, adv, matchDate);
    setSaved(true);
  };

  // ── SETUP ──
  if(matchPhase==="setup") return(
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"Inter,sans-serif"}}>
      <TopBar onBack={onBack} title="Nouveau match"/>
      <div style={{padding:"20px 18px"}}>
        <div style={{background:C.navy,borderRadius:20,padding:"20px",marginBottom:20,
          position:"relative",overflow:"hidden"}}>
          <TerrainBg opacity={0.07}/>
          <div style={{position:"relative",fontSize:11,color:"rgba(255,255,255,0.5)",
            textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>Avant le match</div>
          <div style={{fontSize:18,fontWeight:800,color:C.white,fontFamily:"'Syne',sans-serif"}}>
            {staff.club}
          </div>
          {squad.length>0&&(
            <div style={{fontSize:12,color:C.orange,marginTop:6}}>
              {compoIds.length>0
                ? `✓ Compo enregistrée — ${compoIds.length} joueurs`
                : `${squad.length} joueurs dans l'effectif`}
            </div>
          )}
        </div>

        {compoIds.length===0&&(
          <div style={{background:"#FFF8E8",border:`1.5px solid ${C.draw}`,borderRadius:12,
            padding:"12px 14px",marginBottom:16,fontSize:12,color:"#7A5C00"}}>
            ⚠️ Aucune composition enregistrée. La liste complète de l'effectif sera utilisée.
            Pense à faire la compo avant le prochain match.
          </div>
        )}

        <label style={{fontSize:11,color:C.muted,display:"block",marginBottom:4,
          textTransform:"uppercase",letterSpacing:"0.07em"}}>Adversaire</label>
        <input value={adversaire} onChange={e=>setAdversaire(e.target.value)}
          placeholder="Nom du club adversaire…"
          style={{width:"100%",background:C.bg,border:`1.5px solid ${adversaire?C.orange:C.border}`,
            borderRadius:10,padding:"12px 14px",fontSize:14,outline:"none",
            boxSizing:"border-box",color:C.text,marginBottom:20,fontFamily:"Inter,sans-serif"}}/>

        <button onClick={()=>{
          if(!adversaire.trim()){return;}
          setMatchPhase("live");
        }} style={{width:"100%",background:adversaire.trim()?C.orange:"#C8C0B4",
          color:C.white,border:"none",borderRadius:14,padding:"14px 0",fontSize:15,
          fontWeight:700,cursor:"pointer",fontFamily:"'Syne',sans-serif"}}>
          Démarrer le match →
        </button>
      </div>
    </div>
  );

  // ── SCORE ENTRY ──
  if(matchPhase==="scoreEntry") return(
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"Inter,sans-serif",
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:20,
        color:C.navy,marginBottom:6,textAlign:"center"}}>Score final</div>
      <div style={{fontSize:13,color:C.muted,marginBottom:24,textAlign:"center"}}>
        {staff.club} vs {adversaire}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:28}}>
        {/* Score Nous */}
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:11,color:C.muted,marginBottom:8,textTransform:"uppercase",
            letterSpacing:"0.07em",maxWidth:100,overflow:"hidden",textOverflow:"ellipsis",
            whiteSpace:"nowrap"}}>{staff.club}</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button onClick={()=>setScoreNous(s=>Math.max(0,s-1))} style={{width:36,height:36,
              borderRadius:9,border:`1.5px solid ${C.border}`,background:C.card,
              fontSize:18,cursor:"pointer",fontWeight:700,color:C.muted}}>−</button>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:48,
              color:C.navy,minWidth:60,textAlign:"center"}}>{scoreNous}</div>
            <button onClick={()=>setScoreNous(s=>s+1)} style={{width:36,height:36,
              borderRadius:9,border:"none",background:C.orange,
              fontSize:18,cursor:"pointer",fontWeight:700,color:C.white}}>+</button>
          </div>
          {/* Raccourcis points */}
          <div style={{display:"flex",gap:4,marginTop:8,justifyContent:"center"}}>
            {[[5,"🏉"],[2,"⚽"],[3,"🎯"],[7,"💥"]].map(([pts,emoji])=>(
              <button key={pts} onClick={()=>setScoreNous(s=>s+pts)}
                style={{padding:"4px 8px",borderRadius:6,border:`1px solid ${C.border}`,
                  background:C.card,fontSize:12,cursor:"pointer",color:C.text,fontWeight:600}}>
                {emoji}+{pts}
              </button>
            ))}
          </div>
        </div>
        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:28,color:C.muted}}>–</div>
        {/* Score Eux */}
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:11,color:C.muted,marginBottom:8,textTransform:"uppercase",
            letterSpacing:"0.07em",maxWidth:100,overflow:"hidden",textOverflow:"ellipsis",
            whiteSpace:"nowrap"}}>{adversaire}</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button onClick={()=>setScoreEux(s=>Math.max(0,s-1))} style={{width:36,height:36,
              borderRadius:9,border:`1.5px solid ${C.border}`,background:C.card,
              fontSize:18,cursor:"pointer",fontWeight:700,color:C.muted}}>−</button>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:48,
              color:C.navy,minWidth:60,textAlign:"center"}}>{scoreEux}</div>
            <button onClick={()=>setScoreEux(s=>s+1)} style={{width:36,height:36,
              borderRadius:9,border:"none",background:C.orange,
              fontSize:18,cursor:"pointer",fontWeight:700,color:C.white}}>+</button>
          </div>
          <div style={{display:"flex",gap:4,marginTop:8,justifyContent:"center"}}>
            {[[5,"🏉"],[2,"⚽"],[3,"🎯"],[7,"💥"]].map(([pts,emoji])=>(
              <button key={pts} onClick={()=>setScoreEux(s=>s+pts)}
                style={{padding:"4px 8px",borderRadius:6,border:`1px solid ${C.border}`,
                  background:C.card,fontSize:12,cursor:"pointer",color:C.text,fontWeight:600}}>
                {emoji}+{pts}
              </button>
            ))}
          </div>
        </div>
      </div>
      <div style={{fontSize:11,color:C.muted,marginBottom:16,textAlign:"center"}}>
        🏉+5  ⚽+2  🎯+3  💥+7 (essai+transfo)
      </div>
      <button onClick={saveMatch} style={{width:"100%",maxWidth:300,background:C.orange,
        color:C.white,border:"none",borderRadius:14,padding:"14px 0",fontSize:15,
        fontWeight:700,cursor:"pointer",fontFamily:"'Syne',sans-serif",marginBottom:10}}>
        Enregistrer le match ✓
      </button>
      <button onClick={()=>setMatchPhase("live")} style={{background:"transparent",border:"none",
        color:C.muted,fontSize:13,cursor:"pointer"}}>← Retour à la saisie</button>
    </div>
  );

  if(saved)return(
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"Inter,sans-serif",
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{fontSize:56,marginBottom:16}}>✅</div>
      <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:22,
        color:C.navy,marginBottom:8}}>Stats enregistrées !</div>
      <div style={{color:C.muted,fontSize:14,textAlign:"center",marginBottom:4}}>
        {staff.club} <strong style={{color:scoreNous>scoreEux?C.win:scoreNous<scoreEux?C.loss:C.draw}}>
          {scoreNous} – {scoreEux}
        </strong> {adversaire}
      </div>
      <div style={{color:C.muted,fontSize:13,textAlign:"center",marginBottom:28}}>
        Profils des joueurs mis à jour.
      </div>
      <button onClick={onBack} style={{background:C.navy,color:C.white,border:"none",
        borderRadius:12,padding:"13px 32px",fontSize:15,fontWeight:700,cursor:"pointer",
        fontFamily:"'Syne',sans-serif"}}>Retour au tableau de bord</button>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"Inter,sans-serif",paddingBottom:110}}>
      <TopBar onBack={onBack} title="⏱ Saisie en direct"/>

      {/* Chrono + Score */}
      <div style={{background:C.navy,margin:"12px 16px 10px",borderRadius:16,
        padding:"14px 18px",position:"relative",overflow:"hidden"}}>
        <TerrainBg opacity={0.07}/>
        {/* Ligne 1 : chrono + boutons */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
          position:"relative",marginBottom:12}}>
          <div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.4)",
              textTransform:"uppercase",letterSpacing:"0.1em"}}>Temps de jeu</div>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,
              fontSize:32,color:C.white,lineHeight:1.1}}>{fmtTime(matchTime)}</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setRunning(r=>!r)} style={{background:running?C.draw:C.win,
              color:C.white,border:"none",borderRadius:10,padding:"10px 14px",cursor:"pointer",
              fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:13}}>
              {running?"⏸ Pause":"▶ Start"}
            </button>
            <button onClick={()=>setChangModal(true)} style={{background:"rgba(255,255,255,0.12)",
              color:C.white,border:"none",borderRadius:10,padding:"10px 12px",cursor:"pointer",
              fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:13}}>
              🔄 Chang.
            </button>
          </div>
        </div>
        {/* Ligne 2 : score live */}
        <div style={{position:"relative",background:"rgba(255,255,255,0.08)",
          borderRadius:12,padding:"10px 14px",
          display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{textAlign:"center",flex:1}}>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",marginBottom:2,
              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{staff.club}</div>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:28,
              color:C.white}}>{scoreNous}</div>
            <div style={{display:"flex",gap:4,justifyContent:"center",marginTop:4}}>
              {[[5,"🏉"],[2,"⚽"],[3,"🎯"],[3,"🦵"]].map(([pts,e],i)=>(
                <button key={i} onClick={()=>setScoreNous(s=>s+pts)}
                  style={{padding:"2px 6px",borderRadius:5,border:"none",
                    background:"rgba(255,255,255,0.15)",color:"white",
                    fontSize:11,cursor:"pointer",fontWeight:600}}>
                  {e}
                </button>
              ))}
            </div>
          </div>
          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:20,
            color:"rgba(255,255,255,0.4)",padding:"0 8px"}}>–</div>
          <div style={{textAlign:"center",flex:1}}>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",marginBottom:2,
              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{adversaire}</div>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:28,
              color:C.white}}>{scoreEux}</div>
            <div style={{display:"flex",gap:4,justifyContent:"center",marginTop:4}}>
              {[[5,"🏉"],[2,"⚽"],[3,"🎯"],[3,"🦵"]].map(([pts,e],i)=>(
                <button key={i} onClick={()=>setScoreEux(s=>s+pts)}
                  style={{padding:"2px 6px",borderRadius:5,border:"none",
                    background:"rgba(255,255,255,0.15)",color:"white",
                    fontSize:11,cursor:"pointer",fontWeight:600}}>
                  {e}
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",background:C.alt,margin:"0 16px 12px",borderRadius:99,padding:3}}>
        {[["actions","🏉 Actions"],["plaquages","💪 Plaquages"],["turnovers","🔄 Turnovers"]].map(([t,l])=>(
          <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"8px 0",borderRadius:99,
            border:"none",cursor:"pointer",background:tab===t?C.navy:"transparent",
            color:tab===t?C.white:C.muted,fontFamily:"'Syne',sans-serif",
            fontWeight:700,fontSize:11,transition:"all .2s"}}>{l}</button>
        ))}
      </div>

      <div style={{padding:"0 16px"}}>

        {/* ACTIONS */}
        {tab==="actions"&&<>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
            {ACTION_TYPES.map(a=>(
              <button key={a.type} onClick={()=>{setModal(a);setPicked(null);}} style={{
                background:a.color,color:C.white,border:"none",borderRadius:16,
                padding:"16px 10px",cursor:"pointer",fontFamily:"'Syne',sans-serif",
                textAlign:"center",boxShadow:"0 2px 8px rgba(0,0,0,0.12)"}}>
                <div style={{fontSize:26,marginBottom:4}}>{a.emoji}</div>
                <div style={{fontSize:13,fontWeight:800}}>{a.label}</div>
              </button>
            ))}
          </div>
          <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",
            letterSpacing:"0.1em",marginBottom:8}}>Récap en cours</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {squad.map(p=>{
              const sc=scores[p.id];
              const has=sc.essais||(sc.transfoR+sc.transfoM)||(sc.penR+sc.penM)||(sc.drops||0)||sc.fautes||sc.cartonsJ||sc.cartonsR;
              if(!has)return null;
              return(
                <div key={p.id} style={{background:C.card,borderRadius:12,padding:"10px 14px",
                  border:`1px solid ${C.border}`}}>
                  <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:6}}>
                    #{p.num} {p.name}
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {[
                      {k:"essais",   emoji:"🏉",  label:"Essai",    color:C.win},
                      {k:"transfoR", emoji:"⚽✅", label:"Transfo ✅",color:C.navy},
                      {k:"transfoM", emoji:"⚽❌", label:"Transfo ❌",color:C.loss},
                      {k:"penR",     emoji:"🎯✅", label:"Pén ✅",   color:C.navy},
                      {k:"penM",     emoji:"🎯❌", label:"Pén ❌",   color:C.loss},
                      {k:"fautes",   emoji:"⚠️",  label:"Faute",    color:"#B85C00"},
                      {k:"cartonsJ", emoji:"🟨",  label:"C. Jaune", color:C.draw},
                      {k:"cartonsR", emoji:"🟥",  label:"C. Rouge", color:C.loss},
                    ].filter(x=>sc[x.k]>0).map(x=>(
                      <div key={x.k} style={{display:"flex",alignItems:"center",gap:4,
                        background:C.alt,borderRadius:8,padding:"4px 8px"}}>
                        <span style={{fontSize:12}}>{x.emoji}</span>
                        <span style={{fontSize:12,fontWeight:700,color:x.color}}>{sc[x.k]}</span>
                        <button onClick={()=>setScores(s=>({...s,[p.id]:{...s[p.id],
                          [x.k]:Math.max(0,s[p.id][x.k]-1)}}))}
                          style={{width:18,height:18,borderRadius:4,border:"none",
                            background:"#C8C0B4",color:C.muted,fontSize:11,cursor:"pointer",
                            display:"flex",alignItems:"center",justifyContent:"center",
                            fontWeight:800}}>−</button>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
            {squad.every(p=>{const sc=scores[p.id];
              return!sc.essais&&!(sc.transfoR+sc.transfoM)&&!(sc.penR+sc.penM)&&!sc.fautes&&!sc.cartonsJ&&!sc.cartonsR;})&&
              <div style={{color:C.muted,fontSize:13,textAlign:"center",padding:"14px",
                background:C.card,borderRadius:12,border:`1px solid ${C.border}`}}>
                Aucune action pour l'instant.
              </div>}
          </div>
        </>}

        {/* PLAQUAGES */}
        {tab==="plaquages"&&<>
          <div style={{fontSize:11,color:C.orange,fontWeight:600,marginBottom:12}}>
            ✅ Réussi · ❌ Raté
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {squad.filter(p=>activeIds.has(p.id)).map(p=>(
              <div key={p.id} style={{background:C.card,border:`1px solid ${C.border}`,
                borderRadius:14,padding:"12px 14px",display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:36,height:36,borderRadius:9,background:C.navy,flexShrink:0,
                  display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,
                    fontSize:13,color:C.white}}>#{p.num}</span>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:C.text,
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
                  <div style={{fontSize:11,color:C.muted}}>
                    <span style={{color:C.win,fontWeight:700}}>✅ {scores[p.id].plaqReussis}</span>
                    {"  "}
                    <span style={{color:C.loss,fontWeight:700}}>❌ {scores[p.id].plaqRates}</span>
                  </div>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setScores(s=>({...s,[p.id]:{...s[p.id],plaqReussis:s[p.id].plaqReussis+1}}))}
                    style={{width:48,height:48,borderRadius:12,border:"none",cursor:"pointer",
                      background:"#E8F7EE",fontSize:22,display:"flex",alignItems:"center",justifyContent:"center"}}>✅</button>
                  <button onClick={()=>setScores(s=>({...s,[p.id]:{...s[p.id],plaqRates:s[p.id].plaqRates+1}}))}
                    style={{width:48,height:48,borderRadius:12,border:"none",cursor:"pointer",
                      background:"#FDEAEA",fontSize:22,display:"flex",alignItems:"center",justifyContent:"center"}}>❌</button>
                </div>
              </div>
            ))}
          </div>
        </>}

        {/* TURNOVERS */}
        {tab==="turnovers"&&<>
          <div style={{fontSize:11,color:C.orange,fontWeight:600,marginBottom:12}}>
            🟢 Ballon gagné · 🔴 Ballon perdu
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {squad.filter(p=>activeIds.has(p.id)).map(p=>(
              <div key={p.id} style={{background:C.card,border:`1px solid ${C.border}`,
                borderRadius:14,padding:"12px 14px",display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:36,height:36,borderRadius:9,background:C.navy,flexShrink:0,
                  display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,
                    fontSize:13,color:C.white}}>#{p.num}</span>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:C.text,
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
                  <div style={{fontSize:11,color:C.muted}}>
                    <span style={{color:C.win,fontWeight:700}}>🟢 {scores[p.id].ballonsG}</span>
                    {"  "}
                    <span style={{color:C.loss,fontWeight:700}}>🔴 {scores[p.id].ballonsP}</span>
                  </div>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setScores(s=>({...s,[p.id]:{...s[p.id],ballonsG:s[p.id].ballonsG+1}}))}
                    style={{width:48,height:48,borderRadius:12,border:"none",cursor:"pointer",
                      background:"#E8F7EE",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center"}}>🟢</button>
                  <button onClick={()=>setScores(s=>({...s,[p.id]:{...s[p.id],ballonsP:s[p.id].ballonsP+1}}))}
                    style={{width:48,height:48,borderRadius:12,border:"none",cursor:"pointer",
                      background:"#FDEAEA",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center"}}>🔴</button>
                </div>
              </div>
            ))}
          </div>
        </>}
      </div>

      {/* Sticky save */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",
        width:374,padding:"12px 16px",background:C.bg,borderTop:`1px solid ${C.border}`,zIndex:10}}>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setShowRecap(true)} style={{
            flex:1,background:C.card,color:C.navy,border:`1.5px solid ${C.border}`,
            borderRadius:14,padding:"14px 0",fontSize:13,fontWeight:700,
            cursor:"pointer",fontFamily:"'Syne',sans-serif"}}>
            📋 Récap
          </button>
          <button onClick={()=>setMatchPhase("scoreEntry")} style={{flex:3,background:C.orange,color:C.white,
            border:"none",borderRadius:14,padding:"14px 0",fontSize:15,fontWeight:800,
            cursor:"pointer",fontFamily:"'Syne',sans-serif"}}>
            Enregistrer ✓
          </button>
        </div>
      </div>

      {/* Modale récapitulatif */}
      {showRecap&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",
          display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:60}}>
          <div style={{background:C.bg,borderRadius:"24px 24px 0 0",
            width:"100%",maxWidth:390,maxHeight:"80vh",overflowY:"auto",
            padding:"22px 18px 34px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:18,color:C.navy}}>
                📋 Récapitulatif
              </div>
              <div style={{fontSize:13,color:C.orange,fontWeight:700}}>{fmtTime(matchTime)}</div>
            </div>
            <button onClick={()=>setShowRecap(false)} style={{position:"absolute",top:20,right:18,
              background:"transparent",border:"none",color:C.muted,fontSize:22,cursor:"pointer"}}>×</button>

            {/* Actions par joueur */}
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
              {squad.map(p=>{
                const sc=scores[p.id];
                const tot=sc.essais+(sc.transfoR+sc.transfoM)+(sc.penR+sc.penM)+sc.fautes+sc.cartonsJ+sc.cartonsR;
                const plaqTot=sc.plaqReussis+sc.plaqRates;
                const ballTot=sc.ballonsG+sc.ballonsP;
                if(!tot&&!plaqTot&&!ballTot)return null;
                return(
                  <div key={p.id} style={{background:C.card,borderRadius:12,
                    padding:"12px 14px",border:`1px solid ${C.border}`}}>
                    <div style={{fontSize:13,fontWeight:700,color:C.navy,marginBottom:6}}>
                      #{p.num} {p.name} <span style={{fontSize:11,color:C.muted,fontWeight:400}}>· {p.poste}</span>
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:8,fontSize:12}}>
                      {sc.essais>0&&<span>🏉 <b>{sc.essais}</b> essai{sc.essais>1?"s":""}</span>}
                      {(sc.transfoR+sc.transfoM)>0&&<span>⚽ <b>{sc.transfoR}/{sc.transfoR+sc.transfoM}</b> transfo</span>}
                      {(sc.penR+sc.penM)>0&&<span>🎯 <b>{sc.penR}/{sc.penR+sc.penM}</b> pén.</span>}
                      {sc.fautes>0&&<span style={{color:"#B85C00"}}>⚠️ <b>{sc.fautes}</b> faute{sc.fautes>1?"s":""}</span>}
                      {sc.cartonsJ>0&&<span style={{color:C.draw}}>🟨 <b>{sc.cartonsJ}</b></span>}
                      {sc.cartonsR>0&&<span style={{color:C.loss}}>🟥 <b>{sc.cartonsR}</b></span>}
                      {plaqTot>0&&<span style={{color:C.win}}>💪 <b>{sc.plaqReussis}/{plaqTot}</b> plaq. ({plaqTot>0?Math.round(sc.plaqReussis/plaqTot*100):0}%)</span>}
                      {ballTot>0&&<span>🟢 <b>{sc.ballonsG}</b> / 🔴 <b>{sc.ballonsP}</b></span>}
                    </div>
                  </div>
                );
              })}
              {squad.every(p=>{
                const sc=scores[p.id];
                return!(sc.essais+(sc.transfoR+sc.transfoM)+(sc.penR+sc.penM)+sc.fautes+sc.cartonsJ+sc.cartonsR+sc.plaqReussis+sc.plaqRates+sc.ballonsG+sc.ballonsP);
              })&&(
                <div style={{textAlign:"center",padding:"20px",color:C.muted,fontSize:13}}>
                  Aucune statistique saisie pour l'instant.
                </div>
              )}
            </div>

            <button onClick={()=>setShowRecap(false)} style={{width:"100%",background:C.navy,
              color:C.white,border:"none",borderRadius:12,padding:"13px 0",
              fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'Syne',sans-serif"}}>
              Fermer
            </button>
          </div>
        </div>
      )}

      {/* Modale action */}
      {modal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",
          display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:50}}>
          <div style={{background:C.bg,borderRadius:"24px 24px 0 0",
            padding:"22px 18px 34px",width:"100%",maxWidth:390}}>
            <div style={{textAlign:"center",marginBottom:16}}>
              <span style={{fontSize:30}}>{modal.emoji}</span>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,
                fontSize:18,color:C.navy,marginTop:4}}>{modal.label}</div>
              <div style={{fontSize:13,color:C.muted}}>Quel joueur ?</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:260,overflowY:"auto"}}>
              {squad.map(p=>(
                <button key={p.id} onClick={()=>setPicked(p)} style={{
                  background:pickedPlayer?.id===p.id?C.navy:C.card,
                  color:pickedPlayer?.id===p.id?C.white:C.text,
                  border:`1.5px solid ${pickedPlayer?.id===p.id?C.navy:C.border}`,
                  borderRadius:12,padding:"11px 16px",cursor:"pointer",
                  display:"flex",alignItems:"center",gap:10,
                  textAlign:"left",fontFamily:"Inter,sans-serif"}}>
                  <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:13,
                    color:pickedPlayer?.id===p.id?C.orange:C.muted}}>#{p.num}</span>
                  <span style={{fontSize:14,fontWeight:600}}>{p.name}</span>
                </button>
              ))}
            </div>
            {!resultPending ? (
              <div style={{display:"flex",gap:10,marginTop:14}}>
                <button onClick={()=>{setModal(null);setPicked(null);setResultPending(false);}} style={{flex:1,
                  background:"transparent",border:`1.5px solid ${C.border}`,borderRadius:12,
                  padding:"12px 0",fontSize:14,fontWeight:700,cursor:"pointer",
                  color:C.muted,fontFamily:"'Syne',sans-serif"}}>Annuler</button>
                <button onClick={confirmAction} disabled={!pickedPlayer} style={{flex:2,
                  background:pickedPlayer?modal.color:"#ccc",color:C.white,border:"none",
                  borderRadius:12,padding:"12px 0",fontSize:14,fontWeight:700,
                  cursor:pickedPlayer?"pointer":"default",
                  fontFamily:"'Syne',sans-serif"}}>Valider ✓</button>
              </div>
            ) : (
              <div style={{marginTop:14}}>
                <div style={{fontSize:13,color:C.muted,textAlign:"center",marginBottom:12}}>
                  {modal.type==="transfo"?"Transformation":modal.type==="drops"?"Drop":"Pénalité"} — Résultat ?
                </div>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>confirmResult(true)} style={{flex:1,background:"#E8F7EE",
                    color:C.win,border:`2px solid ${C.win}`,borderRadius:12,padding:"16px 0",
                    fontSize:24,cursor:"pointer",display:"flex",alignItems:"center",
                    justifyContent:"center",flexDirection:"column",gap:4}}>
                    <span>✅</span>
                    <span style={{fontSize:12,fontWeight:700}}>Réussie</span>
                  </button>
                  <button onClick={()=>confirmResult(false)} style={{flex:1,background:"#FDEAEA",
                    color:C.loss,border:`2px solid ${C.loss}`,borderRadius:12,padding:"16px 0",
                    fontSize:24,cursor:"pointer",display:"flex",alignItems:"center",
                    justifyContent:"center",flexDirection:"column",gap:4}}>
                    <span>❌</span>
                    <span style={{fontSize:12,fontWeight:700}}>Ratée</span>
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* Modale changement */}
      {changModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",
          display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:50}}>
          <div style={{background:C.bg,borderRadius:"24px 24px 0 0",
            padding:"22px 18px 34px",width:"100%",maxWidth:390}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:18,
              color:C.navy,marginBottom:4,textAlign:"center"}}>🔄 Changement</div>
            <div style={{fontSize:13,color:C.muted,textAlign:"center",marginBottom:16}}>
              {fmtTime(matchTime)}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
              <div>
                <div style={{fontSize:11,color:C.loss,fontWeight:700,textTransform:"uppercase",
                  letterSpacing:"0.07em",marginBottom:6}}>Qui sort ? ↑</div>
                <div style={{display:"flex",flexDirection:"column",gap:4,
                  maxHeight:180,overflowY:"auto"}}>
                  {squad.filter(p=>activeIds.has(p.id)&&p.num<=15).concat(
                    squad.filter(p=>activeIds.has(p.id)&&p.num>15)
                  ).map(p=>(
                    <button key={p.id} onClick={()=>setChangOut(p)} style={{
                      background:changOut?.id===p.id?"#FDEAEA":C.card,
                      border:`1.5px solid ${changOut?.id===p.id?C.loss:C.border}`,
                      borderRadius:10,padding:"8px 10px",cursor:"pointer",
                      textAlign:"left",fontFamily:"Inter,sans-serif"}}>
                      <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,
                        fontSize:12,color:C.muted}}>#{p.num} </span>
                      <span style={{fontSize:12,fontWeight:600,color:C.text}}>
                        {p.name.split(" ").pop()}
                      </span>
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <div style={{fontSize:11,color:C.win,fontWeight:700,textTransform:"uppercase",
                  letterSpacing:"0.07em",marginBottom:6}}>Qui rentre ? ↓</div>
                <div style={{display:"flex",flexDirection:"column",gap:4,
                  maxHeight:180,overflowY:"auto"}}>
                  {squad.filter(p=>p.num>15&&!activeIds.has(p.id)).map(p=>(
                    <button key={p.id} onClick={()=>setChangIn(p)} style={{
                      background:changIn?.id===p.id?"#E8F7EE":C.card,
                      border:`1.5px solid ${changIn?.id===p.id?C.win:C.border}`,
                      borderRadius:10,padding:"8px 10px",cursor:"pointer",
                      textAlign:"left",fontFamily:"Inter,sans-serif"}}>
                      <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,
                        fontSize:12,color:C.muted}}>#{p.num} </span>
                      <span style={{fontSize:12,fontWeight:600,color:C.text}}>
                        {p.name.split(" ").pop()}
                      </span>
                    </button>
                  ))}
                  {squad.filter(p=>p.num>15&&!activeIds.has(p.id)).length===0&&
                    <div style={{fontSize:12,color:C.muted,padding:"8px"}}>
                      Plus de remplaçants
                    </div>}
                </div>
              </div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>{setChangModal(false);setChangOut(null);setChangIn(null);}}
                style={{flex:1,background:"transparent",border:`1.5px solid ${C.border}`,
                  borderRadius:12,padding:"12px 0",fontSize:14,fontWeight:700,
                  cursor:"pointer",color:C.muted,fontFamily:"'Syne',sans-serif"}}>Annuler</button>
              <button onClick={confirmChange} disabled={!changOut||!changIn} style={{flex:2,
                background:changOut&&changIn?C.navy:"#ccc",color:C.white,border:"none",
                borderRadius:12,padding:"12px 0",fontSize:14,fontWeight:700,
                cursor:changOut&&changIn?"pointer":"default",
                fontFamily:"'Syne',sans-serif"}}>Confirmer</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   STAFF PLAYER VIEW
/* ══════════════════════════════════════════════════════════ */
function StaffPlayerView({player,onBack}){
  const s=player.saison;
  const tot=s.plaqReussis+s.plaqRates;
  const eff=tot>0?Math.round(s.plaqReussis/tot*100):0;
  return(
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"Inter,sans-serif",paddingBottom:32}}>
      <TopBar onBack={onBack} title="Fiche joueur"/>
      <div style={{padding:"16px"}}>
        <HeroNavy>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{width:52,height:52,borderRadius:12,overflow:"hidden",background:C.orange,
              flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
              {player.photo
                ?<img src={player.photo} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>
                :<span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,
                  fontSize:20,color:C.white}}>#{player.num}</span>}
            </div>
            <div>
              <div style={{fontSize:17,fontWeight:700,color:C.white}}>{player.name}</div>
              <div style={{fontSize:13,color:C.orange,fontWeight:600}}>{player.poste}</div>
              <div style={{fontSize:11,color:"#8899BB",marginTop:1}}>
                {s.matchs} matchs · {s.minutesJouees} min.
              </div>
            </div>
          </div>
        </HeroNavy>

        <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",
          letterSpacing:"0.1em",marginBottom:8}}>Statistiques saison</div>
        <StatGrid items={[
          {label:"Essais",          value:s.essais,      accent:C.win},
          {label:"Transfo réussies",value:s.transfoR,    accent:C.win},
          {label:"Transfo ratées", value:s.transfoM,    accent:C.loss},
          {label:"Pén. réussies",  value:s.penR,        accent:C.win},
          {label:"Pén. ratées",    value:s.penM,        accent:C.loss},
          {label:"Fautes",          value:s.fautes,      accent:C.draw},
          {label:"Cartons jaunes",  value:s.cartonsJ,    accent:C.draw},
          {label:"Cartons rouges",  value:s.cartonsR,    accent:s.cartonsR>0?C.loss:C.muted},
          {label:"Ballons gagnés",  value:s.ballonsG,    accent:C.win},
          {label:"Ballons perdus",  value:s.ballonsP,    accent:C.loss},
        ]}/>

        <div style={{background:C.card,borderRadius:14,padding:"14px 16px",
          border:`1px solid ${C.border}`}}>
          {[
            {l:"Efficacité plaquages",v:`${eff}%`,c:C.win},
            {l:"Essais / match",v:s.matchs>0?+(s.essais/s.matchs).toFixed(1):0,c:C.orange},
          ].map((r,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",
              alignItems:"center",padding:"9px 0",
              borderBottom:i<1?`1px solid ${C.border}`:"none"}}>
              <span style={{fontSize:13,color:C.text}}>{r.l}</span>
              <span style={{fontFamily:"'Syne',sans-serif",fontWeight:800,
                fontSize:20,color:r.c}}>{r.v}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   APP ROOT
/* ══════════════════════════════════════════════════════════ */
function App(){
  const [screen,setScreen]=useState("login");
  const [role,setRole]=useState(null);
  const [user,setUser]=useState(null);
  const [match,setMatch]=useState(null);
  const [player,setPlayer]=useState(null);
  const photoRef=useRef();

  const login=(r,u)=>{
    setRole(r);setUser(u);
    if(r==="joueur")       setScreen("profile");
    else if(r==="admin")   setScreen("admin-dash");
    else if(r==="president")  setScreen("president-dash");
    else if(r==="entraineur") setScreen("staff-dash");
    else if(CAN_SAISIE.includes(r)) setScreen("benevole-dash");
  };
  const logout=()=>{setRole(null);setUser(null);setScreen("login");};

  const backFromSaisie=()=>{
    if(role==="president")       setScreen("president-dash");
    else if(CAN_SAISIE.includes(role)) setScreen("benevole-dash");
    else setScreen("staff-dash");
  };
  const backFromPlayer=()=>{
    if(role==="president") setScreen("president-dash");
    else setScreen("staff-dash");
  };

  const handlePhotoChange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      const p=PLAYERS.find(x=>x.id===user.id);
      if(p){p.photo=ev.target.result;setUser({...user,photo:ev.target.result});}
    };
    r.readAsDataURL(f);
  };

  return(
    <div style={{minHeight:"100vh",background:"#D8D4CC",display:"flex",
      alignItems:"center",justifyContent:"center",padding:20}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        input,select,button{font-family:inherit;}
        ::-webkit-scrollbar{width:3px;}
        ::-webkit-scrollbar-thumb{background:#C8C0B4;border-radius:4px;}
      `}</style>

      <input ref={photoRef} type="file" accept="image/*"
        onChange={handlePhotoChange} style={{display:"none"}}/>

      <div style={{width:390,minHeight:780,maxHeight:"92vh",background:C.bg,borderRadius:46,
        border:"8px solid #C8C0B4",
        boxShadow:"0 40px 100px rgba(0,0,0,0.2),0 0 0 1px #B8B0A4",
        overflow:"hidden",overflowY:"auto",position:"relative"}}>
        <div style={{position:"sticky",top:0,width:110,height:26,background:"#C8C0B4",
          borderRadius:"0 0 16px 16px",margin:"0 auto",zIndex:100}}/>

        {screen==="login"          &&<LoginScreen onLogin={login}
          onRegister={()=>setScreen("register")}
          onStaffRegister={()=>setScreen("staff-register")}/>}
        {screen==="register"       &&<RegisterScreen onBack={()=>setScreen("login")} onDone={u=>login("joueur",u)}/>}
        {screen==="staff-register" &&<StaffRegisterScreen onBack={()=>setScreen("login")} onDone={()=>setScreen("login")}/>}

        {screen==="profile"        &&<PlayerProfile user={user} onLogout={logout}
          onMatchClick={m=>{setMatch(m);setScreen("match-detail");}}
          onEditPhoto={()=>photoRef.current.click()}/>}
        {screen==="match-detail"   &&<MatchDetail match={match} user={user} onBack={()=>setScreen("profile")}/>}

        {screen==="admin-dash"     &&<AdminDashboard onLogout={logout}/>}

        {screen==="president-dash" &&<PresidentDashboard user={user} onLogout={logout}
          onCompo={()=>setScreen("compo")}
          onPlayerClick={p=>{setPlayer(p);setScreen("staff-player");}}/>}

        {screen==="staff-dash"     &&<StaffDashboard staff={user} onLogout={logout}
          onSaisie={()=>setScreen("saisie")}
          onCompo={()=>setScreen("compo")}
          onPlayerClick={p=>{setPlayer(p);setScreen("staff-player");}}/>}

        {screen==="benevole-dash"  &&<BenevoleDashboard user={user} onLogout={logout}
          onSaisie={()=>setScreen("saisie")}
          onCompo={()=>setScreen("compo")}/>}

        {screen==="compo"          &&<CompoScreen club={user?.club}
          onBack={()=>{
            if(role==="president")       setScreen("president-dash");
            else if(CAN_SAISIE.includes(role)) setScreen("benevole-dash");
            else setScreen("staff-dash");
          }}/>}

        {screen==="saisie"         &&<SaisieLive staff={user} onBack={backFromSaisie}/>}
        {screen==="staff-player"   &&<StaffPlayerView player={player} onBack={backFromPlayer}/>}
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
